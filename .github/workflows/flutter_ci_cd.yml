name: Flutter CI/CD

on:
  push:
    branches: [ master ] # तुमच्या मेन ब्रांचचे नाव (उदा. main किंवा master)
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # 4. Install Dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Run Linter and Tests
      - name: Run Linter and Tests
        run: |
          flutter analyze
          flutter test

      # 6. Build APK
      - name: Build APK
        run: flutter build apk --release

      # 7. Upload APK Artifact (GitHub साठी)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # 8. Upload APK to Firebase App Distribution (Direct CLI Entrypoint)
      - name: Upload APK to Firebase App Distribution
        uses: w9jds/firebase-action@v15.24.0
        entrypoint: /bin/sh
        with:
          args: -c "firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk --app '${{ secrets.FIREBASE_APP_ID }}' --release-notes 'New CI/CD Build via GitHub Actions' --groups 'testers'"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}