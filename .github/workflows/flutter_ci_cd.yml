name: Flutter CI/CD

on:
  push:
    branches: [ master ] # किंवा master (तुमच्या ब्रांचनुसार बदला)
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK - Updated to @v5 for Node.js 24 runtime support
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '11'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Run Linter and Tests
      - name: Run Linter and Tests
        run: |
          flutter analyze
          flutter test

      # 6. Build APK
      - name: Build APK
        run: flutter build apk --release

      # 7. Upload APK Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
