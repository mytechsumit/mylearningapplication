Node.js 20 is deprecated. The following actions target Node.js 20 but are being forced to run on Node.js 24: actions/checkout@v4, actions/setup-java@v4. For more information see: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

This warning indicates that GitHub Actions is transitioning its runtime from Node.js 20 to Node.js 24.

The actions in your workflow (such as actions/checkout@v4 and actions/setup-java@v4) were compiled or configured for Node.js 20. Because GitHub Actions is forcing these tasks onto the Node.js 24 runtime, you see this notice in your job logs.

How to Fix It
Update the major version tags of the affected actions in your workflow YAML files (located in .github/workflows/):

1. Bump Action Versions
Update your action tags to versions natively updated to target Node.js 24:

YAML
# Change from actions/setup-java@v4 to v5
- uses: actions/setup-java@v5
  with:
    java-version: '21'
    distribution: 'temurin'

# Check for updated versions of checkout or other actions
- uses: actions/checkout@v4 # Update to @v5 once released, or check for patch updates
Note: actions/setup-java@v5 moves the internal action runtime from node20 to node24.

2. Audit Other Actions
Search your .github/workflows/ directory for any other third-party or custom actions:

Third-party actions: Ensure you bump them to their latest release tags.

Custom actions: If you maintain your own custom action in a repo, update runs.using: 'node20' to runs.using: 'node24' inside its action.yml file.

Is my pipeline currently breaking?
In most cases, no. GitHub Actions is executing your Node 20 actions using the Node 24 engine. However, updating action versions resolves the warning and avoids potential compatibility issues before Node.js 20 is completely removed from runners.

